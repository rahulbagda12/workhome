<svg width="1200" height="1500" viewBox="0 0 1200 1500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="1500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0F19" />
      <stop offset="0.5" stop-color="#1E1B4B" />
      <stop offset="1" stop-color="#0F766E" />
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 220) rotate(45) scale(400 400)">
      <stop stop-color="#6366F1" stop-opacity="0.55" />
      <stop offset="1" stop-color="#6366F1" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(950 350) rotate(135) scale(420 420)">
      <stop stop-color="#06B6D4" stop-opacity="0.45" />
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0" />
    </radialGradient>
    <filter id="blur" x="-40" y="-40" width="1280" height="1580" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>
  <rect width="1200" height="1500" rx="56" fill="url(#bg)" />
  <rect x="-40" y="-20" width="700" height="700" rx="350" fill="url(#glow1)" filter="url(#blur)" />
  <rect x="640" y="130" width="620" height="620" rx="310" fill="url(#glow2)" filter="url(#blur)" />
  <rect x="72" y="88" width="1056" height="1324" rx="44" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.12" />
  <text x="110" y="182" fill="#C7D2FE" font-size="34" font-family="Arial, Helvetica, sans-serif" letter-spacing="6">WORK FROM HOME</text>
  <text x="110" y="295" fill="#FFFFFF" font-size="86" font-weight="700" font-family="Arial, Helvetica, sans-serif">ઘેર બેઠા કમાવવાની</text>
  <text x="110" y="384" fill="#FFFFFF" font-size="86" font-weight="700" font-family="Arial, Helvetica, sans-serif">સુવર્ણ તક!</text>
  <text x="110" y="480" fill="#D1D5DB" font-size="40" font-family="Arial, Helvetica, sans-serif">પાર્ટ-ટાઇમ વર્ક • ઘરે બેઠા જ • તમારી અનુકૂળતા મુજબ</text>
  <rect x="110" y="560" width="980" height="2" fill="white" fill-opacity="0.2" />
  <text x="110" y="650" fill="#FFFFFF" font-size="44" font-family="Arial, Helvetica, sans-serif">કામની વિગતો</text>
  <text x="110" y="726" fill="#E5E7EB" font-size="34" font-family="Arial, Helvetica, sans-serif">• કામ: પાર્ટ-ટાઇમ વર્ક</text>
  <text x="110" y="786" fill="#E5E7EB" font-size="34" font-family="Arial, Helvetica, sans-serif">• ક્યાંથી: તમારા ઘરે બેઠા જ</text>
  <text x="110" y="846" fill="#E5E7EB" font-size="34" font-family="Arial, Helvetica, sans-serif">• કોણ કરી શકે: હાઉસવાઇફ, સ્ટુડન્ટ્સ, રીટાયર્ડ વ્યક્તિઓ અથવા કોઈપણ</text>
  <text x="110" y="906" fill="#E5E7EB" font-size="34" font-family="Arial, Helvetica, sans-serif">• ઉંમરની મર્યાદા: કોઈ ઉંમર બંધન નથી</text>
  <rect x="110" y="980" width="980" height="214" rx="30" fill="white" fill-opacity="0.08" stroke="#67E8F9" stroke-opacity="0.35" />
  <text x="150" y="1048" fill="#67E8F9" font-size="38" font-weight="700" font-family="Arial, Helvetica, sans-serif">શા માટે જોડાવું?</text>
  <text x="150" y="1110" fill="#FFFFFF" font-size="31" font-family="Arial, Helvetica, sans-serif">• તમારી અનુકૂળતા મુજબના સમયે કામ કરો</text>
  <text x="150" y="1162" fill="#FFFFFF" font-size="31" font-family="Arial, Helvetica, sans-serif">• પરિવારની જવાબદારીઓ સાથે પણ સરળતાથી થઈ શકે</text>
  <text x="150" y="1214" fill="#FFFFFF" font-size="31" font-family="Arial, Helvetica, sans-serif">• કોઈ ખાસ ડિગ્રી કે અનુભવની જરૂર નથી</text>
  <rect x="110" y="1260" width="980" height="150" rx="28" fill="#111827" fill-opacity="0.55" stroke="#A78BFA" stroke-opacity="0.35" />
  <text x="150" y="1320" fill="#FFFFFF" font-size="34" font-weight="700" font-family="Arial, Helvetica, sans-serif">નામ: બિનલ ચાવડા (Binal Chavda)</text>
  <text x="150" y="1374" fill="#A5F3FC" font-size="38" font-weight="700" font-family="Arial, Helvetica, sans-serif">મોબાઈલ: +91 78628 15015</text>
</svg>
